<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sistema Inventarios IEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#EDEEE7;--surface:#FFF;--ink:#1B231F;--muted:#707A72;
  --teal:#2E6E62;--teal-ink:#1F4D44;--red:#C84B3C;--amber:#B86A1A;
  --blue:#2A5FA5;--purple:#5C3D8F;--line:#D9DBD2;--radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--ink);color:#fff;padding:14px 18px 10px;}
header h1{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin:0;letter-spacing:0.03em;text-transform:uppercase;}
.sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#aaa;margin-top:3px;}
.conn-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#aaa;margin-right:5px;vertical-align:middle;}
.conn-dot.ok{background:#4CAF50;} .conn-dot.err{background:var(--red);}
.alm-tabs{display:flex;background:var(--ink);border-bottom:2px solid #333;overflow-x:auto;}
.alm-tabs::-webkit-scrollbar{display:none;}
.alm-btn{flex:0 0 auto;border:none;background:none;color:#aaa;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;padding:10px 14px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.alm-btn.active{color:#fff;border-bottom-color:var(--teal);}
.sec-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--line);overflow-x:auto;}
.sec-tabs::-webkit-scrollbar{display:none;}
.sec-tab{flex:0 0 auto;border:none;background:none;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;color:var(--muted);padding:11px 12px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.sec-tab.active{color:var(--teal-ink);border-bottom-color:var(--teal);}
main{flex:1;padding:14px 14px 40px;background:var(--bg);}
input[type=text],input[type=number],input[type=date],input[type=password],select,textarea{font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);width:100%;}
textarea{resize:vertical;min-height:60px;}
label{display:block;font-size:11px;color:var(--muted);margin:0 0 3px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;}
.field{margin-bottom:10px;}
.row-2{display:flex;gap:8px;}.row-2>*{flex:1;}
.row-3{display:flex;gap:6px;}.row-3>*{flex:1;}
.btn{border:none;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;padding:10px 14px;cursor:pointer;letter-spacing:0.02em;}
.btn-teal{background:var(--teal);color:#fff;} .btn-teal:hover{background:var(--teal-ink);}
.btn-red{background:var(--red);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--ink);}
.btn-full{width:100%;} .btn-sm{font-size:11px;padding:6px 10px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-top:12px;}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin:0 0 2px;}
.card-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
.divider{border:none;border-top:1px dashed var(--line);margin:10px 0;}
.slabel{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin:0 0 8px;}
.slabel.verde{color:var(--teal-ink);} .slabel.rojo{color:var(--red);} .slabel.azul{color:var(--blue);} .slabel.morado{color:var(--purple);} .slabel.gris{color:var(--muted);}
.badge{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;border:1.5px solid;border-radius:5px;padding:2px 5px;white-space:nowrap;display:inline-block;}
.badge-red{border-color:var(--red);color:var(--red);} .badge-amber{border-color:var(--amber);color:var(--amber);} .badge-teal{border-color:var(--teal);color:var(--teal-ink);} .badge-blue{border-color:var(--blue);color:var(--blue);}
.scan-frame{position:relative;width:100%;aspect-ratio:1/1;background:#0F1411;border-radius:var(--radius);overflow:hidden;}
#reader{width:100%;height:100%;}
#reader video{width:100%!important;height:100%!important;object-fit:cover;}
.corner{position:absolute;width:26px;height:26px;border:3px solid var(--teal);pointer-events:none;z-index:2;}
.corner.tl{top:14px;left:14px;border-right:none;border-bottom:none;border-radius:4px 0 0 0;}
.corner.tr{top:14px;right:14px;border-left:none;border-bottom:none;border-radius:0 4px 0 0;}
.corner.bl{bottom:14px;left:14px;border-right:none;border-top:none;border-radius:0 0 0 4px;}
.corner.br{bottom:14px;right:14px;border-left:none;border-top:none;border-radius:0 0 4px 0;}
.scan-hint{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin:8px 0 12px;}
.manual-row{display:flex;gap:8px;margin-bottom:12px;}
.manual-row input{flex:1;}
.stock-big{font-family:'IBM Plex Mono',monospace;font-size:13px;margin:8px 0 10px;}
.stock-big b{font-size:22px;}
.lote-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px dotted var(--line);}
.lote-row:last-child{border-bottom:none;}
.lote-info{flex:1;min-width:0;}
.lote-num{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
.lote-exp{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:1px;}
.lote-exp.proxima{color:var(--amber);font-weight:600;} .lote-exp.vencida{color:var(--red);font-weight:600;}
.lote-qty{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;text-align:right;min-width:34px;}
.ledger-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px dashed var(--line);cursor:pointer;}
.ledger-row:last-child{border-bottom:none;}
.ledger-main{flex:1;min-width:0;}
.ledger-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ledger-code{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px;}
.ledger-right{text-align:right;}
.ledger-qty{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;}
.hist-row{padding:9px 0;border-bottom:1px dashed var(--line);font-size:12px;}
.hist-row:last-child{border-bottom:none;}
.hist-top{display:flex;justify-content:space-between;align-items:baseline;}
.hist-type{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;}
.hist-type.alta{color:var(--teal);} .hist-type.baja{color:var(--red);} .hist-type.venta{color:var(--blue);} .hist-type.transferencia{color:var(--purple);} .hist-type.ajuste{color:var(--amber);}
.hist-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);}
.hist-detail{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.summary-card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
.s-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.04em;margin-bottom:2px;}
.s-val{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;}
.s-val.alert{color:var(--red);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.overlay.hidden{display:none;}
.modal{background:var(--surface);border-radius:14px 14px 0 0;padding:20px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;}
.modal h3{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin:0 0 14px;}
.empty{text-align:center;color:var(--muted);font-size:12px;padding:28px 10px;font-family:'IBM Plex Mono',monospace;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;border-radius:8px;opacity:0;transition:opacity .2s,transform .2s;z-index:200;pointer-events:none;max-width:90%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Sistema Inventarios IEM</h1>
    <div class="sub"><span class="conn-dot" id="connDot"></span><span id="connText">Conectando…</span></div>
  </header>
  <div class="alm-tabs">
    <button class="alm-btn active" data-alm="IEM_General">IEM General</button>
    <button class="alm-btn" data-alm="TAVI">TAVI</button>
    <button class="alm-btn" data-alm="CARDIO">CARDIO</button>
    <button class="alm-btn" data-alm="CRM">CRM</button>
  </div>
  <div class="sec-tabs" id="secTabs"></div>
  <main id="mainContent"></main>
</div>

<!-- TRANSFER MODAL -->
<div class="overlay hidden" id="transferOverlay">
  <div class="modal">
    <h3>Transferencia desde IEM General</h3>
    <div class="field"><label>Destino</label>
      <select id="trDest"><option value="TAVI">TAVI</option><option value="CARDIO">CARDIO</option><option value="CRM">CRM</option></select>
    </div>
    <div class="field"><label>Lote a transferir</label><select id="trLote"></select></div>
    <div class="field"><label>Cantidad</label><input type="number" id="trQty" min="1" value="1"/></div>
    <div class="field"><label>PIN de autorización</label><input type="password" id="trPin" placeholder="••••"/></div>
    <div class="row-2" style="margin-top:10px;">
      <button class="btn btn-ghost btn-full" id="trCancel">Cancelar</button>
      <button class="btn btn-purple btn-full" id="trConfirm">Transferir</button>
    </div>
  </div>
</div>

<!-- VENTA MODAL -->
<div class="overlay hidden" id="ventaOverlay">
  <div class="modal">
    <h3>Registrar Venta</h3>
    <div class="row-2">
      <div class="field"><label>Fecha</label><input type="date" id="vFecha"/></div>
      <div class="field"><label>Lugar</label><input type="text" id="vLugar" placeholder="Hospital…"/></div>
    </div>
    <div class="field"><label>Cliente</label><input type="text" id="vCliente" placeholder="Nombre completo"/></div>
    <div class="field"><label>Médico</label><input type="text" id="vMedico" placeholder="Dr. …"/></div>
    <div class="field"><label>Lote</label><select id="vLote"></select></div>
    <div class="row-3">
      <div class="field"><label>Cantidad</label><input type="number" id="vCantidad" min="1" value="1"/></div>
      <div class="field"><label>Precio unit.</label><input type="number" id="vPrecio" min="0" value="0"/></div>
      <div class="field"><label>Total</label><input type="number" id="vTotal" min="0" value="0"/></div>
    </div>
    <div class="field"><label>Factura (opcional)</label><input type="text" id="vFactura" placeholder="FAC-001"/></div>
    <div class="row-2" style="margin-top:10px;">
      <button class="btn btn-ghost btn-full" id="vCancel">Cancelar</button>
      <button class="btn btn-blue btn-full" id="vConfirm">Registrar venta</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const FB = {
  apiKey:"AIzaSyB0imQ269-d2ujvAh6_63u0LO3g3pTgZvo",
  authDomain:"inventario-iem.firebaseapp.com",
  databaseURL:"https://inventario-iem-default-rtdb.firebaseio.com",
  projectId:"inventario-iem",
  storageBucket:"inventario-iem.firebasestorage.app",
  messagingSenderId:"468795388652",
  appId:"1:468795388652:web:1e12714a6b5aa3ff3febc9"
};
const ALMACENES   = ['IEM_General','TAVI','CARDIO','CRM'];
const ALM_LABELS  = {IEM_General:'IEM General',TAVI:'TAVI',CARDIO:'CARDIO',CRM:'CRM'};
const VENTA_ALMS  = ['TAVI','CARDIO','CRM'];
const PIN_TRANSFER = '1234';
const PIN_AJUSTE   = '4675';

// ── STATE ────────────────────────────────────────────────────
let db, invRef, histRef;
let data     = {};   // data[alm][code] = {name,minStock,lotes:[]}
let historial= {};   // historial[alm][id] = entry
let curAlm   = 'IEM_General';
let curSec   = 'escanear';
let scanCode = null;
let scanAlm  = null;
let scannerRunning = false;
let qrScanner;
let reportesMes = '';

// ── UTILS ────────────────────────────────────────────────────
const esc = s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const skey= s=>String(s||'').replace(/[.#$\/\[\]]/g,'_');
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function totalQty(p){return(p.lotes||[]).reduce((s,l)=>s+l.qty,0);}
function today(){return new Date().toISOString().slice(0,10);}
function nowTs(){return new Date().toISOString();}
function fmtDate(iso){return(iso||'').slice(0,10)||'—';}
function expStatus(f){
  if(!f)return'ok';
  const d=Math.ceil((new Date(f+' 00:00')-new Date(today()+' 00:00'))/864e5);
  return d<0?'vencida':d<=30?'proxima':'ok';
}
function almData(a){return data[a]||{};}
function almHist(a){return historial[a]||{};}
function setConn(ok){
  document.getElementById('connDot').className='conn-dot '+(ok?'ok':'err');
  document.getElementById('connText').textContent=ok?'Conectado · en tiempo real':'Sin conexión';
}
function mesLabel(m){
  if(!m)return'';
  const[y,mo]=m.split('-');
  return['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo-1]+' '+y;
}

// ── FIREBASE ─────────────────────────────────────────────────
function initFirebase(){
  firebase.initializeApp(FB);
  db     = firebase.database();
  invRef = db.ref('inventoryV2');
  histRef= db.ref('historialV2');
  invRef.on('value',snap=>{
    const inc=snap.val()||{};
    ALMACENES.forEach(a=>{ if(inc[a]!==undefined) data[a]=inc[a]; });
    setConn(true);
    renderView();
  },()=>setConn(false));
  histRef.on('value',snap=>{
    historial=snap.val()||{};
    if(curSec==='historial'||curSec==='reportes') renderView();
  });
}
async function saveAlm(alm){
  if(!data[alm]) data[alm]={};
  await invRef.child(alm).set(data[alm]);
}
async function addHist(alm,entry){
  const id='h_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  await histRef.child(alm).child(id).set({...entry,id,almacen:alm});
}

// ── TABS ─────────────────────────────────────────────────────
const SECS = {
  IEM_General:['escanear','inventario','agregar','qr','ajustes','historial','reportes'],
  TAVI:['escanear','inventario','agregar','qr','ajustes','historial','reportes'],
  CARDIO:['escanear','inventario','agregar','qr','ajustes','historial','reportes'],
  CRM:['escanear','inventario','agregar','qr','ajustes','historial','reportes'],
};
const SEC_LABELS={escanear:'Escanear',inventario:'Inventario',agregar:'Agregar',qr:'QR',ajustes:'Ajustes',historial:'Historial',reportes:'Reportes'};

function renderTabs(){
  document.querySelectorAll('.alm-btn').forEach(b=>b.classList.toggle('active',b.dataset.alm===curAlm));
  const secs=SECS[curAlm]||SECS.IEM_General;
  document.getElementById('secTabs').innerHTML=secs.map(s=>
    `<button class="sec-tab${s===curSec?' active':''}" data-sec="${s}">${SEC_LABELS[s]}</button>`
  ).join('');
  document.querySelectorAll('.sec-tab').forEach(b=>b.addEventListener('click',()=>{curSec=b.dataset.sec;renderView();}));
}

document.querySelectorAll('.alm-btn').forEach(b=>b.addEventListener('click',()=>{
  curAlm=b.dataset.alm; curSec='escanear'; scanCode=null; stopScanner(); renderView();
}));

function renderView(){
  renderTabs();
  const m=document.getElementById('mainContent');
  if(curSec==='escanear')    renderScanView(m);
  else if(curSec==='inventario') renderInventoryView(m);
  else if(curSec==='agregar')    renderAddView(m);
  else if(curSec==='qr')         renderQRView(m);
  else if(curSec==='ajustes')    renderAjustesView(m);
  else if(curSec==='historial')  renderHistorialView(m);
  else if(curSec==='reportes')   renderReportesView(m);
}

// ── SCANNER ──────────────────────────────────────────────────
function stopScanner(){
  if(qrScanner&&scannerRunning){qrScanner.stop().catch(()=>{});scannerRunning=false;}
}
function startScanner(hintId){
  if(scannerRunning)return;
  const hint=document.getElementById(hintId);
  if(typeof Html5Qrcode==='undefined'){if(hint)hint.textContent='Escáner no disponible.';return;}
  qrScanner=new Html5Qrcode('reader');
  const cfg={fps:15,qrbox:{width:250,height:250},formatsToSupport:[Html5QrcodeSupportedFormats.QR_CODE],aspectRatio:1.0,experimentalFeatures:{useBarCodeDetectorIfSupported:true}};
  Html5Qrcode.getCameras().then(cameras=>{
    if(!cameras||!cameras.length){if(hint)hint.textContent='No se detectó cámara.';return;}
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const camArg=isIOS||cameras.length===1?{facingMode:{exact:'environment'}}:cameras.find(c=>/back|rear|trasera/i.test(c.label))?.id||cameras[cameras.length-1].id;
    qrScanner.start(camArg,cfg,decoded=>{
      if(navigator.vibrate)navigator.vibrate(80);
      const clean=decoded.trim().replace(/^\]C[0-9]/,'').replace(/^\]d[0-9]/,'');
      scanCode=skey(clean); scanAlm=curAlm;
      if(hint)hint.textContent='Código detectado ✓';
      renderProductCard();
    },()=>{}).then(()=>{scannerRunning=true;if(hint)hint.textContent='Apunta la cámara al código QR';})
    .catch(()=>{if(hint)hint.textContent='No se pudo iniciar la cámara. Usa el campo manual.';});
  }).catch(()=>{if(hint)hint.textContent='Acceso a cámara no disponible.';});
}

// ── SCAN VIEW ────────────────────────────────────────────────
function renderScanView(m){
  m.innerHTML=`
    <div class="scan-frame"><div id="reader"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div class="scan-hint" id="scanHint">Iniciando cámara…</div>
    <div class="manual-row">
      <input type="text" id="manualCode" placeholder="O escribe el código aquí"/>
      <button class="btn btn-teal" id="manualBtn">Buscar</button>
    </div>
    <div id="productCard"></div>`;
  startScanner('scanHint');
  document.getElementById('manualBtn').addEventListener('click',()=>{
    const v=document.getElementById('manualCode').value.trim();
    if(!v)return;
    scanCode=skey(v);scanAlm=curAlm;renderProductCard();
  });
  if(scanCode&&scanAlm===curAlm) renderProductCard();
}

function renderProductCard(){
  const c=document.getElementById('productCard');
  if(!c)return;
  const code=scanCode, alm=scanAlm||curAlm;
  const p=almData(alm)[code];
  if(!p){
    c.innerHTML=`<div class="card">
      <div class="card-title">Producto no encontrado</div>
      <div class="card-sub">${esc(code)}</div>
      <p style="font-size:13px;color:var(--muted);margin:8px 0 12px">No está registrado en ${ALM_LABELS[alm]}.</p>
      <button class="btn btn-teal btn-full" id="goAdd">Registrar producto nuevo</button>
    </div>`;
    document.getElementById('goAdd').addEventListener('click',()=>{curSec='agregar';renderView();setTimeout(()=>{const el=document.getElementById('newCode');if(el)el.value=code;},80);});
    return;
  }
  const total=totalQty(p),low=total<=p.minStock;
  const lotes=p.lotes||[];
  const activos=lotes.filter(l=>l.qty>0).sort((a,b)=>(a.caducidad||'').localeCompare(b.caducidad||''));
  const lotesHTML=lotes.length===0?'<div class="empty" style="padding:8px 0">Sin lotes. Da una alta.</div>':
    lotes.map(l=>{const st=expStatus(l.caducidad);const expTxt=l.caducidad?(st==='vencida'?`VENCIDA · ${l.caducidad}`:st==='proxima'?`PRÓX · ${l.caducidad}`:`CAD · ${l.caducidad}`):'Sin fecha';

    <button class="btn btn-purple btn-full" id="trBtn">Iniciar transferencia</button>`:''}
    ${isSale&&activos.length?`

    <button class="btn btn-blue btn-full" id="ventaBtn">Registrar venta</button>`:''}
    <div class="divider"></div><div class="slabel gris">Lotes registrados</div>

  document.getElementById('altaBtn').addEventListener('click',()=>doAlta(alm,code));

    document.getElementById('bajaBtn')?.addEventListener('click',()=>doBaja(alm,code));

    if(isSale)    document.getElementById('ventaBtn')?.addEventListener('click',()=>openVenta(alm,code,activos));
  }
}

// ── ALTA ─────────────────────────────────────────────────────
async function doAlta(alm,code){
  const lote=document.getElementById('aLote').value.trim();
  const cad=document.getElementById('aCad').value;
  const qty=parseInt(document.getElementById('aQty').value,10);
  if(!lote){showToast('Escribe el número de lote');return;}
  if(isNaN(qty)||qty<=0){showToast('Cantidad inválida');return;}
  if(!data[alm]||!data[alm][code]){showToast('Producto no encontrado');return;}
  data[alm][code].lotes=data[alm][code].lotes||[];
  data[alm][code].lotes.push({id:'lot_'+Date.now(),lote,caducidad:cad||'',qty});
  await saveAlm(alm);
  await addHist(alm,{tipo:'alta',fecha:nowTs(),producto:data[alm][code].name,codigo:code,lote,caducidad:cad||'',cantidad:qty});
  showToast(`Alta: Lote ${lote} · ${qty} uds`);renderProductCard();
}

// ── BAJA ─────────────────────────────────────────────────────
async function doBaja(alm,code){
  const loteId=document.getElementById('bSelect').value;
  const qty=parseInt(document.getElementById('bQty').value,10);
  if(isNaN(qty)||qty<=0){showToast('Cantidad inválida');return;}
  if(!data[alm]||!data[alm][code]){showToast('Producto no encontrado');return;}
  const lote=data[alm][code].lotes.find(l=>l.id===loteId);
  if(!lote){showToast('Lote no encontrado');return;}
  if(qty>lote.qty){showToast(`Solo hay ${lote.qty} uds`);return;}
  lote.qty-=qty;
  await saveAlm(alm);
  await addHist(alm,{tipo:'baja',fecha:nowTs(),producto:data[alm][code].name,codigo:code,lote:lote.lote,cantidad:qty,fechaBaja:today()});
  showToast(`Baja: Lote ${lote.lote} · −${qty} uds`);renderProductCard();
}

// ── TRANSFER ─────────────────────────────────────────────────
function openTransfer(code,activos){
  const ov=document.getElementById('transferOverlay');ov.classList.remove('hidden');
  document.getElementById('trLote').innerHTML=activos.map(l=>`<option value="${esc(l.id)}">Lote ${esc(l.lote)} · ${l.caducidad||'Sin fecha'} · ${l.qty} uds</option>`).join('');
  document.getElementById('trPin').value='';document.getElementById('trQty').value='1';
  document.getElementById('trCancel').onclick=()=>ov.classList.add('hidden');
  document.getElementById('trConfirm').onclick=async()=>{
    if(document.getElementById('trPin').value!==PIN_TRANSFER){showToast('PIN incorrecto');return;}
    const dest=document.getElementById('trDest').value;
    const loteId=document.getElementById('trLote').value;
    const qty=parseInt(document.getElementById('trQty').value,10);
    if(isNaN(qty)||qty<=0){showToast('Cantidad inválida');return;}
    const src='IEM_General';
    const lote=data[src][code].lotes.find(l=>l.id===loteId);
    if(!lote){showToast('Lote no encontrado');return;}
    if(qty>lote.qty){showToast(`Solo hay ${lote.qty} uds`);return;}
    lote.qty-=qty;
    await saveAlm(src);
    if(!data[dest]) data[dest]={};
    if(!data[dest][code]) data[dest][code]={name:data[src][code].name,minStock:data[src][code].minStock||0,lotes:[]};
    data[dest][code].lotes=data[dest][code].lotes||[];
    data[dest][code].lotes.push({id:'lot_'+Date.now(),lote:lote.lote,caducidad:lote.caducidad,qty});
    await saveAlm(dest);
    const nom=data[src][code].name;
    await addHist(src,{tipo:'transferencia',fecha:nowTs(),producto:nom,codigo:code,lote:lote.lote,cantidad:qty,destino:dest,direccion:'salida'});
    await addHist(dest,{tipo:'transferencia',fecha:nowTs(),producto:nom,codigo:code,lote:lote.lote,cantidad:qty,origen:src,direccion:'entrada'});
    ov.classList.add('hidden');showToast(`Transferido: ${qty} uds → ${ALM_LABELS[dest]}`);renderProductCard();
  };
}

// ── VENTA ────────────────────────────────────────────────────
function openVenta(alm,code,activos){
  const ov=document.getElementById('ventaOverlay');ov.classList.remove('hidden');
  document.getElementById('vLote').innerHTML=activos.map(l=>`<option value="${esc(l.id)}">Lote ${esc(l.lote)} · ${l.caducidad||'Sin fecha'} · ${l.qty} uds</option>`).join('');
  document.getElementById('vFecha').value=today();
  ['vCliente','vMedico','vLugar','vFactura'].forEach(id=>document.getElementById(id).value='');
  ['vCantidad','vPrecio','vTotal'].forEach(id=>document.getElementById(id).value=id==='vCantidad'?'1':'0');
  document.getElementById('vCancel').onclick=()=>ov.classList.add('hidden');
  document.getElementById('vConfirm').onclick=async()=>{
    const cliente=document.getElementById('vCliente').value.trim();
    const medico=document.getElementById('vMedico').value.trim();
    const lugar=document.getElementById('vLugar').value.trim();
    const fecha=document.getElementById('vFecha').value;
    const factura=document.getElementById('vFactura').value.trim();
    const loteId=document.getElementById('vLote').value;
    const cantidad=parseInt(document.getElementById('vCantidad').value,10);
    const precio=parseFloat(document.getElementById('vPrecio').value)||0;
    const totalVenta=parseFloat(document.getElementById('vTotal').value)||0;
    if(!cliente){showToast('Escribe el nombre del cliente');return;}
    if(isNaN(cantidad)||cantidad<=0){showToast('Cantidad inválida');return;}
    const lote=data[alm][code].lotes.find(l=>l.id===loteId);
    if(!lote){showToast('Lote no encontrado');return;}
    if(cantidad>lote.qty){showToast(`Solo hay ${lote.qty} uds`);return;}
    lote.qty-=cantidad;
    await saveAlm(alm);
    await addHist(alm,{tipo:'venta',fecha:nowTs(),fechaVenta:fecha,producto:data[alm][code].name,codigo:code,lote:lote.lote,caducidad:lote.caducidad,cantidad,precio,totalVenta,cliente,medico,lugar,factura});
    ov.classList.add('hidden');showToast(`Venta: ${cantidad} uds · $${totalVenta}`);renderProductCard();
  };
}

    if(!f.length){ct.innerHTML='<div class="empty">Sin productos en este almacén.</div>';return;}
    ct.innerHTML=`<div class="card" style="padding:6px 14px;">`+f.map(code=>{
      const p=inv[code],tot=totalQty(p),low=tot<=p.minStock;
      const lotes=p.lotes||[];
      const hv=lotes.some(l=>expStatus(l.caducidad)==='vencida'&&l.qty>0);
      const hp=lotes.some(l=>expStatus(l.caducidad)==='proxima'&&l.qty>0);
      return `<div class="ledger-row" data-code="${esc(code)}">
        <div class="ledger-main"><div class="ledger-name">${esc(p.name)}</div><div class="ledger-code">${esc(code)}</div></div>
        <div class="ledger-right"><div class="ledger-qty">${tot}</div>
        <div>${hv?'<span class="badge badge-red">VEN</span> ':''}${hp?'<span class="badge badge-amber">PRÓX</span> ':''}${low?'<span class="badge badge-red">BAJO</span>':''}</div></div>
      </div>`;
    }).join('')+'</div>';
    ct.querySelectorAll('.ledger-row').forEach(r=>r.addEventListener('click',()=>{scanCode=r.dataset.code;scanAlm=curAlm;curSec='escanear';stopScanner();renderView();setTimeout(renderProductCard,80);}));
  }
  rl();
  document.getElementById('srch').addEventListener('input',e=>rl(e.target.value.trim().toLowerCase()));
}

  m.innerHTML=`<div class="card" style="margin-top:0">

    <div class="card-sub">${ALM_LABELS[curAlm]}</div>
    <div class="divider"></div>

    </div>
    <div class="row-2">
      <div class="field"><label>Código personalizado</label><input type="text" id="qrCode" placeholder="Ej. TAVI-23MM"/></div>
      <div class="field"><label>Nombre en etiqueta</label><input type="text" id="qrLbl" placeholder="Nombre visible"/></div>
    </div>
    <button class="btn btn-teal btn-full" id="genQrBtn">Generar QR</button>
    <div id="qrResult" style="display:none;margin-top:16px;text-align:center;">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;" id="qrLblShow"></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:12px;" id="qrCodeShow"></div>

      <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;margin:0 0 12px;">
        Toma una captura de pantalla o usa Imprimir etiqueta.<br>Al escanear el QR, el producto se identifica automáticamente.
      </p>
      <div class="row-2">
        <button class="btn btn-ghost btn-full" id="qrOtroBtn">Generar otro</button>
        <button class="btn btn-teal btn-full" id="qrPrintBtn">Imprimir etiqueta</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="slabel gris" style="margin-bottom:8px">Productos en ${ALM_LABELS[curAlm]}</div>
    <div id="qrProdList">
      ${!codes.length?'<div class="empty">Sin productos en este almacén.</div>':
        codes.map(c=>`<div class="ledger-row" data-code="${esc(c)}" data-name="${esc(inv[c]?.name||'')}">
          <div class="ledger-main"><div class="ledger-name">${esc(inv[c]?.name||c)}</div><div class="ledger-code">${esc(c)}</div></div>
          <div style="font-size:20px;color:var(--muted);">⊞</div>
        </div>`).join('')}
    </div>
  </div>`;

  document.getElementById('qrSel').addEventListener('change',e=>{
    const c=e.target.value;
    if(c){document.getElementById('qrCode').value=c;document.getElementById('qrLbl').value=inv[c]?.name||'';}
  });
  document.getElementById('genQrBtn').addEventListener('click',()=>{
    const code=document.getElementById('qrCode').value.trim()||document.getElementById('qrSel').value;
    const lbl=document.getElementById('qrLbl').value.trim()||code;
    if(!code){showToast('Selecciona o escribe un código');return;}
    genQR(code,lbl);
  });
  m.querySelectorAll('#qrProdList .ledger-row').forEach(r=>r.addEventListener('click',()=>{
    const code=r.dataset.code,name=r.dataset.name;
    document.getElementById('qrCode').value=code;
    document.getElementById('qrLbl').value=name;
    document.getElementById('qrSel').value=code;
    genQR(code,name);
    m.scrollTo({top:0,behavior:'smooth'});
  }));
}
function genQR(code,lbl){
  const res=document.getElementById('qrResult');
  const cv=document.getElementById('qrCanvas');
  cv.innerHTML='';res.style.display='block';
  document.getElementById('qrLblShow').textContent=lbl;
  document.getElementById('qrCodeShow').textContent=code;
  new QRCode(cv,{text:code,width:220,height:220,colorDark:'#1B231F',colorLight:'#FFFFFF',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('qrPrintBtn').onclick=()=>printQR(code,lbl);
  document.getElementById('qrOtroBtn').onclick=()=>{
    res.style.display='none';
    document.getElementById('qrCode').value='';
    document.getElementById('qrLbl').value='';
    document.getElementById('qrSel').value='';
  };
}
function printQR(code,lbl){
  const el=document.querySelector('#qrCanvas canvas')||document.querySelector('#qrCanvas img');
  if(!el){showToast('Genera el QR primero');return;}
  const src=el.tagName==='CANVAS'?el.toDataURL():el.src;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Etiqueta QR</title>
  <style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Helvetica,sans-serif;background:#fff;}
  .wrap{text-align:center;padding:20px;border:2px solid #1B231F;border-radius:10px;}
  img{width:180px;height:180px;display:block;margin:0 auto 10px;}
  .name{font-size:14px;font-weight:700;color:#1B231F;margin-bottom:4px;}
  .code{font-size:11px;color:#707A72;font-family:monospace;letter-spacing:0.05em;}
  .org{font-size:10px;color:#aaa;margin-top:8px;text-transform:uppercase;letter-spacing:0.08em;}
  </style></head><body><div class="wrap">
  <img src="${src}"/>
  <div class="name">${lbl}</div>
  <div class="code">${code}</div>
  <div class="org">Sistema Inventarios IEM</div>
  </div><script>window.onload=()=>window.print();<\/script></body></html>`);
  w.document.close();
}

    <div class="field"><label>Nombre</label><input type="text" id="ajNom" value="${esc(p.name)}"/></div>
    <div class="field"><label>Stock mínimo</label><input type="number" id="ajMin" value="${p.minStock||0}" min="0"/></div>
    <button class="btn btn-teal btn-full" id="ajSaveProd">Guardar cambios</button>
    <div class="divider"></div>
    <div class="slabel azul">Editar lote</div>
    ${!lotes.length?'<div class="empty" style="padding:8px 0">Sin lotes registrados.</div>':`
    <div class="field"><label>Selecciona el lote</label><select id="ajLoteSel">${lotesOpts}</select></div>
    <div class="row-3">
      <div class="field"><label>N° Lote</label><input type="text" id="ajLoteNum"/></div>
      <div class="field"><label>Caducidad</label><input type="date" id="ajLoteCad"/></div>
      <div class="field"><label>Cantidad</label><input type="number" id="ajLoteQty" min="0"/></div>
    </div>
    <div class="row-2">
      <button class="btn btn-blue btn-full" id="ajSaveLote">Guardar lote</button>
      <button class="btn btn-red btn-full" id="ajDelLote">Eliminar lote</button>
    </div>`}
    <div class="divider"></div>
    <div class="slabel rojo">Eliminar producto</div>
    <button class="btn btn-red btn-full" id="ajDelProd">Eliminar producto completo</button>
    <div class="divider"></div>
    <button class="btn btn-ghost btn-full" id="ajBack">← Volver a la lista</button>
  </div>`;

  function fillLote(){
    const idx=parseInt(document.getElementById('ajLoteSel')?.value||'0');
    const l=lotes[idx]; if(!l)return;
    document.getElementById('ajLoteNum').value=l.lote||'';
    document.getElementById('ajLoteCad').value=l.caducidad||'';
    document.getElementById('ajLoteQty').value=l.qty||0;
  }
  if(lotes.length){fillLote();document.getElementById('ajLoteSel').addEventListener('change',fillLote);}

  document.getElementById('ajSaveProd').addEventListener('click',async()=>{
    const nom=document.getElementById('ajNom').value.trim();
    const min=parseInt(document.getElementById('ajMin').value,10)||0;
    if(!nom){showToast('El nombre no puede estar vacío');return;}
    if(!data[curAlm]) data[curAlm]={};
    if(!data[curAlm][code]) data[curAlm][code]={lotes:[]};
    data[curAlm][code].name=nom;data[curAlm][code].minStock=min;
    await saveAlm(curAlm);
    await addHist(curAlm,{tipo:'ajuste',fecha:nowTs(),producto:nom,codigo:code,detalle:'Nombre/mínimo editado'});
    showToast('Producto actualizado');renderAjForm(code);
  });

  document.getElementById('ajSaveLote')?.addEventListener('click',async()=>{
    const idx=parseInt(document.getElementById('ajLoteSel').value);
    const num=document.getElementById('ajLoteNum').value.trim();
    const cad=document.getElementById('ajLoteCad').value;
    const qty=parseInt(document.getElementById('ajLoteQty').value,10);
    if(!num){showToast('El número de lote no puede estar vacío');return;}
    if(isNaN(qty)||qty<0){showToast('Cantidad inválida');return;}
    const old={...data[curAlm][code].lotes[idx]};
    data[curAlm][code].lotes[idx]={...data[curAlm][code].lotes[idx],lote:num,caducidad:cad||'',qty};
    await saveAlm(curAlm);
    await addHist(curAlm,{tipo:'ajuste',fecha:nowTs(),producto:p.name,codigo:code,detalle:`Lote ${old.lote}→${num} · Qty ${old.qty}→${qty} · CAD ${old.caducidad||'—'}→${cad||'—'}`});
    showToast('Lote actualizado');renderAjForm(code);
  });

  document.getElementById('ajDelLote')?.addEventListener('click',async()=>{
    const idx=parseInt(document.getElementById('ajLoteSel').value);
    const lote=data[curAlm][code].lotes[idx];
    if(!confirm(`¿Eliminar lote ${lote.lote} (${lote.qty} uds)?`))return;
    data[curAlm][code].lotes.splice(idx,1);
    await saveAlm(curAlm);
    await addHist(curAlm,{tipo:'ajuste',fecha:nowTs(),producto:p.name,codigo:code,detalle:`Lote ${lote.lote} eliminado (${lote.qty} uds)`});
    showToast('Lote eliminado');renderAjForm(code);
  });

  document.getElementById('ajDelProd').addEventListener('click',async()=>{
    if(!confirm(`¿Eliminar "${p.name}" y todos sus lotes de ${ALM_LABELS[curAlm]}?`))return;
    const nom=data[curAlm][code].name;
    delete data[curAlm][code];
    await saveAlm(curAlm);
    await addHist(curAlm,{tipo:'ajuste',fecha:nowTs(),producto:nom,codigo:code,detalle:'Producto eliminado del almacén'});
    showToast('Producto eliminado');
    fm.style.display='none';
    document.getElementById('ajList').style.display='block';
    renderAjList('');
  });

  document.getElementById('ajBack').addEventListener('click',()=>{
    fm.style.display='none';
    document.getElementById('ajList').style.display='block';
    renderAjList('');
  });
}

// ── HISTORIAL VIEW ───────────────────────────────────────────
function renderHistorialView(m){
  const hist=almHist(curAlm);
  const entries=Object.values(hist).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  m.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;">${ALM_LABELS[curAlm]} · ${entries.length} movimientos</div>
      <button class="btn btn-ghost btn-sm" id="expHistBtn">Excel</button>
    </div>
    <div id="histList"></div>`;
  const ct=document.getElementById('histList');
  if(!entries.length){ct.innerHTML='<div class="empty">Sin movimientos registrados.</div>';return;}
  ct.innerHTML=entries.map(e=>{
    let det='';
    if(e.tipo==='alta') det=`Lote ${e.lote} · ${e.cantidad} uds · CAD ${e.caducidad||'—'}`;
    else if(e.tipo==='baja') det=`Lote ${e.lote} · −${e.cantidad} uds · ${fmtDate(e.fechaBaja)}`;
    else if(e.tipo==='venta') det=`${e.cliente} · Dr.${e.medico} · Lote ${e.lote} · ${e.cantidad} uds · $${e.totalVenta} · ${e.lugar}`;
    else if(e.tipo==='transferencia') det=`${e.direccion==='salida'?'→ '+ALM_LABELS[e.destino]:'← '+ALM_LABELS[e.origen]} · Lote ${e.lote} · ${e.cantidad} uds`;
    else if(e.tipo==='ajuste') det=e.detalle||'';
    return `<div class="hist-row">
      <div class="hist-top"><span class="hist-type ${e.tipo||''}">${(e.tipo||'').toUpperCase()}</span><span class="hist-date">${fmtDate(e.fecha)} ${(e.fecha||'').slice(11,16)}</span></div>
      <div style="font-weight:600;font-size:12px;margin-top:2px;">${esc(e.producto)}</div>
      <div class="hist-detail">${esc(det)}</div>
    </div>`;
  }).join('');
  document.getElementById('expHistBtn').addEventListener('click',()=>exportHist(curAlm,entries));
}

// ── REPORTES VIEW ────────────────────────────────────────────
function renderReportesView(m){
  let raw=[];
  VENTA_ALMS.forEach(a=>{
    Object.values(almHist(a)).filter(e=>e.tipo==='venta').forEach(e=>raw.push({...e,_alm:a,almacen:ALM_LABELS[a]}));
  });
  raw.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const meses=[...new Set(raw.map(v=>(v.fechaVenta||v.fecha||'').slice(0,7)))].filter(Boolean).sort((a,b)=>b.localeCompare(a));
  if(reportesMes&&!meses.includes(reportesMes)) reportesMes='';
  const ventas=reportesMes?raw.filter(v=>(v.fechaVenta||v.fecha||'').startsWith(reportesMes)):raw;
  const montoTotal=ventas.reduce((s,v)=>s+(parseFloat(v.totalVenta)||0),0);
  const udsTotal=ventas.reduce((s,v)=>s+(parseInt(v.cantidad)||0),0);

  m.innerHTML=`
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">Ventas${reportesMes?' ('+mesLabel(reportesMes)+')':''}</div><div class="s-val">${ventas.length}</div></div>
      <div class="summary-card"><div class="s-label">Monto total</div><div class="s-val">$${montoTotal.toLocaleString('es-MX')}</div></div>
      <div class="summary-card"><div class="s-label">Unidades</div><div class="s-val">${udsTotal}</div></div>
      <div class="summary-card"><div class="s-label">Almacenes</div><div class="s-val">${VENTA_ALMS.length}</div></div>
    </div>
    <div class="card" style="margin-bottom:12px;padding:10px 14px;">
      <div class="row-2" style="align-items:flex-end;gap:8px;">
        <div class="field" style="margin:0">
          <label>Filtrar por mes</label>
          <select id="mesFiltro">
            <option value="">Todos los meses</option>
            ${meses.map(mo=>`<option value="${mo}"${reportesMes===mo?' selected':''}>${mesLabel(mo)}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-teal btn-sm" id="expVentasBtn" style="margin-bottom:1px">Excel</button>
      </div>
    </div>
    <div id="ventasList"></div>`;

  document.getElementById('mesFiltro').addEventListener('change',e=>{reportesMes=e.target.value;renderReportesView(m);});
  document.getElementById('expVentasBtn').addEventListener('click',()=>exportVentas(ventas));

  const ct=document.getElementById('ventasList');
  if(!ventas.length){ct.innerHTML='<div class="empty">Sin ventas en este período.</div>';return;}
  ct.innerHTML=ventas.map(v=>`
    <div class="card" style="margin-bottom:8px;padding:12px 14px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;color:var(--blue);">${esc(v.almacen)}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-left:6px;">${fmtDate(v.fechaVenta)}</span>
        </div>
        <button class="btn btn-ghost btn-sm edit-v" data-id="${esc(v.id)}" data-alm="${esc(v._alm)}" style="padding:4px 8px;font-size:11px;">Editar</button>
      </div>
      <div style="font-weight:700;font-size:13px;margin:5px 0 3px;">${esc(v.producto)}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);line-height:1.7;">
        Cliente: ${esc(v.cliente)}<br>Médico: Dr. ${esc(v.medico||'—')}<br>
        Lugar: ${esc(v.lugar||'—')}<br>
        Lote: ${esc(v.lote)} · ${v.cantidad} uds · $${v.precio}/u · <b style="color:var(--ink)">$${v.totalVenta}</b>
        ${v.factura?`<br>Factura: ${esc(v.factura)}`:''}
      </div>
    </div>`).join('');

  ct.querySelectorAll('.edit-v').forEach(btn=>btn.addEventListener('click',()=>openEditVenta(btn.dataset.id,btn.dataset.alm,m)));
}

function openEditVenta(id,alm,m){
  const venta=Object.values(almHist(alm)).find(e=>e.id===id);
  if(!venta){showToast('Venta no encontrada');return;}
  const ov=document.createElement('div');
  ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <h3>Editar venta</h3>
    <div class="row-2">
      <div class="field"><label>Fecha</label><input type="date" id="evFecha" value="${venta.fechaVenta||''}"/></div>
      <div class="field"><label>Lugar</label><input type="text" id="evLugar" value="${esc(venta.lugar||'')}"/></div>
    </div>
    <div class="field"><label>Cliente</label><input type="text" id="evCliente" value="${esc(venta.cliente||'')}"/></div>
    <div class="field"><label>Médico</label><input type="text" id="evMedico" value="${esc(venta.medico||'')}"/></div>
    <div class="field"><label>Lote</label><input type="text" id="evLote" value="${esc(venta.lote||'')}"/></div>
    <div class="row-3">
      <div class="field"><label>Cantidad</label><input type="number" id="evCant" value="${venta.cantidad||0}" min="0"/></div>
      <div class="field"><label>Precio unit.</label><input type="number" id="evPrecio" value="${venta.precio||0}" min="0"/></div>
      <div class="field"><label>Total</label><input type="number" id="evTotal" value="${venta.totalVenta||0}" min="0"/></div>
    </div>
    <div class="field"><label>Factura</label><input type="text" id="evFactura" value="${esc(venta.factura||'')}"/></div>
    <div class="row-2" style="margin-top:10px;">
      <button class="btn btn-ghost btn-full" id="evCancel">Cancelar</button>
      <button class="btn btn-blue btn-full" id="evGuardar">Guardar cambios</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#evCancel').addEventListener('click',()=>{document.body.removeChild(ov);});
  ov.querySelector('#evGuardar').addEventListener('click',async()=>{
    const updated={...venta,
      fechaVenta:document.getElementById('evFecha').value,
      lugar:document.getElementById('evLugar').value.trim(),
      cliente:document.getElementById('evCliente').value.trim(),
      medico:document.getElementById('evMedico').value.trim(),
      lote:document.getElementById('evLote').value.trim(),
      cantidad:parseInt(document.getElementById('evCant').value)||0,
      precio:parseFloat(document.getElementById('evPrecio').value)||0,
      totalVenta:parseFloat(document.getElementById('evTotal').value)||0,
      factura:document.getElementById('evFactura').value.trim(),
      _editado:nowTs()
    };
    await histRef.child(alm).child(id).set(updated);
    showToast('Venta actualizada');
    document.body.removeChild(ov);
    renderReportesView(m);
  });
}

// ── EXCEL ────────────────────────────────────────────────────
function exportHist(alm,entries){
  const rows=entries.map(e=>({'Fecha':fmtDate(e.fecha),'Hora':(e.fecha||'').slice(11,16),'Tipo':e.tipo,'Producto':e.producto,'Código':e.codigo,'Lote':e.lote||'','Caducidad':e.caducidad||'','Cantidad':e.cantidad||'','Cliente':e.cliente||'','Médico':e.medico||'','Lugar':e.lugar||'','Total Venta':e.totalVenta||'','Precio Unit.':e.precio||'','Factura':e.factura||'','Origen/Destino':e.destino||e.origen||'','Detalle':e.detalle||''}));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,ALM_LABELS[alm]);
  XLSX.writeFile(wb,`historial_${alm}_${today()}.xlsx`);
}
function exportVentas(ventas){
  const rows=ventas.map(v=>({'Fecha Venta':fmtDate(v.fechaVenta),'Almacén':v.almacen,'Producto':v.producto,'Código':v.codigo,'Lote':v.lote||'','Caducidad':v.caducidad||'','Cantidad':v.cantidad,'Precio Unit.':v.precio,'Total Venta':v.totalVenta,'Cliente':v.cliente,'Médico':v.medico,'Lugar':v.lugar,'Factura':v.factura||''}));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Ventas');
  XLSX.writeFile(wb,`ventas_IEM_${today()}.xlsx`);
}

// ── INIT ─────────────────────────────────────────────────────
initFirebase();
renderView();
</script>
</body>
</html>
